<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>UAT Document Comparison</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #f0f0f0; }
  .nav { position: fixed; top: 0; left: 0; right: 0; background: #333; color: white; padding: 8px 16px; z-index: 100; display: flex; gap: 12px; align-items: center; }
  .nav button { background: #2453db; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .nav button.active { background: #1a3da0; }
  .nav span { font-size: 13px; color: #ccc; }
  .frames { display: flex; margin-top: 40px; height: calc(100vh - 40px); }
  .frame { flex: 1; border: none; }
  .label { position: fixed; top: 44px; background: rgba(0,0,0,0.7); color: white; padding: 4px 12px; font-size: 12px; z-index: 99; }
  .label.left { left: 0; }
  .label.right { right: 0; }
</style></head>
<body>
<div class="nav">
  <button onclick="show('llc')" id="btn-llc" class="active">LLC Operating Agreement</button>
  <button onclick="show('corp')" id="btn-corp">Corp Shareholder Agreement</button>
  <span>| Left = Original Template | Right = Generated Document |</span>
</div>
<div class="label left" id="lbl-left">ORIGINAL TEMPLATE</div>
<div class="label right" id="lbl-right">GENERATED DOCUMENT</div>
<div class="frames">
  <iframe id="left" class="frame" src="uat_llc_orig.html"></iframe>
  <iframe id="right" class="frame" src="uat_llc_gen.html"></iframe>
</div>
<script>
function show(type) {
  document.getElementById('left').src = 'uat_' + type + '_orig.html';
  document.getElementById('right').src = 'uat_' + type + '_gen.html';
  document.getElementById('btn-llc').className = type === 'llc' ? 'active' : '';
  document.getElementById('btn-corp').className = type === 'corp' ? 'active' : '';
}
</script>
</body></html>
