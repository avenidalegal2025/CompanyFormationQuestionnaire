name: Deploy SS-4 Lambda

on:
  push:
    branches: [main]
    paths:
      - 'lambda-functions/ss4_lambda_s3_complete.py'
      - '.github/workflows/deploy-ss4-lambda.yml'
      - '.github/workflows/deploy-lambda-reusable.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy-lambda-reusable.yml
    secrets: inherit
    with:
      function_name: ss4-lambda-s3-complete
      source_file: ss4_lambda_s3_complete.py
      target_filename: ss4_lambda_s3_complete.py
      handler: ss4_lambda_s3_complete.lambda_handler
      runtime: python3.9
      architecture: x86_64
      deps: "reportlab PyPDF2 typing_extensions"
      stub_pil: true
